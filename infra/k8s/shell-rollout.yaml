apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: shell
  namespace: fiap-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shell
  template:
    metadata:
      labels:
        app: shell
    spec:
      containers:
        - name: shell
          image: ghcr.io/gerps2/fiap-store-shell:latest
          ports:
            - containerPort: 80
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: {}
        - setWeight: 30
        - pause: { duration: 60 }
        - setWeight: 60
        - pause: { duration: 60 }
---
apiVersion: v1
kind: Service
metadata:
  name: shell
  namespace: fiap-store
spec:
  selector:
    app: shell
  ports:
    - port: 80
      targetPort: 80
