name: Infra — Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite "destroy" para confirmar (IRREVERSÍVEL)'
        required: true

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: deployments/infra
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/420326696636/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deploy@project-94ea6a01-7eb7-4014-b16.iam.gserviceaccount.com'

      - uses: google-github-actions/get-gke-credentials@v2
        continue-on-error: true
        with:
          cluster_name: fiap-store
          location: us-central1
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Delete Kubernetes resources
        run: |
          kubectl delete -f deployments/k8s/ --ignore-not-found=true || true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        env:
          TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
        run: terraform destroy -auto-approve -lock=false -var="project_id=${{ secrets.GCP_PROJECT_ID }}"
