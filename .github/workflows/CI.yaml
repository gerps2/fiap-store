name: CI — Pull Request

on:
  pull_request:
    branches: [develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci
      - run: npm run test:ci
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: src/frontend/coverage/

  build:
    name: Build All MFEs
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci
      - run: npm run build:all

  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        service:
          - { name: shell            }
          - { name: mfe-produtos     }
          - { name: mfe-carrinho     }
          - { name: mfe-checkout     }
          - { name: mfe-notificacoes }
          - { name: backend          }
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service.name }}
        run: |
          docker build \
            -f deployments/docker/${{ matrix.service.name }}/Dockerfile \
            . \
            --tag fiap-store-${{ matrix.service.name }}:pr-${{ github.event.pull_request.number }}
