name: Infra — Terraform Apply

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite "apply" para confirmar'
        required: true

env:
  DOMAIN: gerson-prudencio.com.br

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'apply'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: deployments/infra
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/420326696636/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deploy@project-94ea6a01-7eb7-4014-b16.iam.gserviceaccount.com'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        env:
          TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
        run: terraform plan -var="project_id=${{ secrets.GCP_PROJECT_ID }}" -out=tfplan

      - name: Terraform Apply
        env:
          TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
        run: terraform apply -auto-approve tfplan

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: fiap-store
          location: us-central1
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install NGINX Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml

      - name: Install Argo Rollouts
        run: |
          kubectl create namespace argo-rollouts --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml

      - name: Apply Kubernetes namespace
        working-directory: .
        run: kubectl apply -f deployments/k8s/namespace.yaml
