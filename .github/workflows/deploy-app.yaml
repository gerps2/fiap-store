name: Deploy — Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão a deployar (ex: 1.2.3)'
        required: true
      strategy:
        description: 'Estratégia de deploy'
        required: true
        default: 'canary'
        type: choice
        options: [canary, bluegreen]
      canary_weight:
        description: 'Peso inicial do canary (%) — ignorado em bluegreen'
        required: false
        default: '10'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fiap-store
  DOMAIN: gerson-prudencio.com.br
  API_URL: https://gerson-prudencio.com.br/api

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend images
        run: |
          SERVICES=(shell mfe-produtos mfe-carrinho mfe-checkout mfe-notificacoes)
          VERSION=${{ steps.version.outputs.value }}

          for SERVICE in "${SERVICES[@]}"; do
            echo "Building $SERVICE..."
            docker build \
              -f deployments/docker/$SERVICE/Dockerfile \
              . \
              --tag ${{ env.IMAGE_PREFIX }}-$SERVICE:$VERSION \
              --tag ${{ env.IMAGE_PREFIX }}-$SERVICE:latest
            docker push ${{ env.IMAGE_PREFIX }}-$SERVICE:$VERSION
            docker push ${{ env.IMAGE_PREFIX }}-$SERVICE:latest
          done

      - name: Build and push backend
        run: |
          VERSION=${{ steps.version.outputs.value }}
          docker build \
            -f deployments/docker/backend/Dockerfile \
            . \
            --tag ${{ env.IMAGE_PREFIX }}-backend:$VERSION \
            --tag ${{ env.IMAGE_PREFIX }}-backend:latest
          docker push ${{ env.IMAGE_PREFIX }}-backend:$VERSION
          docker push ${{ env.IMAGE_PREFIX }}-backend:latest

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/420326696636/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deploy@project-94ea6a01-7eb7-4014-b16.iam.gserviceaccount.com'

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: fiap-store
          location: us-central1
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f deployments/k8s/namespace.yaml
          kubectl apply -f deployments/k8s/

      - name: Update backend image
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          kubectl set image deployment/backend \
            backend=${{ env.IMAGE_PREFIX }}-backend:$VERSION \
            -n fiap-store

      - name: Install Argo Rollouts kubectl plugin
        run: |
          curl -sLO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts-linux-amd64
          sudo mv kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      - name: Update MFE rollouts
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          ROLLOUTS=(shell mfe-produtos mfe-carrinho mfe-checkout mfe-notificacoes)
          SERVICES=(shell mfe-produtos mfe-carrinho mfe-checkout mfe-notificacoes)

          for i in "${!ROLLOUTS[@]}"; do
            ROLLOUT=${ROLLOUTS[$i]}
            SERVICE=${SERVICES[$i]}
            echo "Updating rollout $ROLLOUT to version $VERSION..."
            kubectl argo rollouts set image $ROLLOUT \
              $SERVICE=${{ env.IMAGE_PREFIX }}-$SERVICE:$VERSION \
              -n fiap-store
          done

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/backend -n fiap-store --timeout=600s || true

      - name: Show rollout status
        run: kubectl argo rollouts list rollouts -n fiap-store
