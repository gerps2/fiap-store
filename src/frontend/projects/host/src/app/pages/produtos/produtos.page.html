
    <div class="layout">
      <div class="main mfe-boundary" data-mfe="mfe-produtos">
        <ui-remote-outlet
          [loader]="carregarProdutos"
          displayName="catalogo de produtos"
          [retry]="retryProdutos"
        >
          <ng-template #skeleton>
            <div class="sk">
              <div class="sk__header">
                <div class="fiap-skeleton" style="width: 120px; height: 16px;"></div>
                <div class="fiap-skeleton" style="width: 320px; height: 44px; margin-top: 12px;"></div>
                <div class="fiap-skeleton" style="width: 200px; height: 14px; margin-top: 12px;"></div>
              </div>
              <div class="sk__grid">
                @for (_ of placeholders; track $index) {
                  <div class="sk-card">
                    <div class="fiap-skeleton sk-card__media"></div>
                    <div class="fiap-skeleton sk-card__line sk-card__line--lg"></div>
                    <div class="fiap-skeleton sk-card__line sk-card__line--md"></div>
                    <div class="fiap-skeleton sk-card__line sk-card__line--sm"></div>
                  </div>
                }
              </div>
            </div>
          </ng-template>
        </ui-remote-outlet>
      </div>
    </div>
